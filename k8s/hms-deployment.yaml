# Hive Metastore Service (HMS) — standalone deployment for Forge catalog registration
#
# Provides: thrift://hms.forge.svc.cluster.local:9083
#
# Image: ilum/hive:3.1.3 (multi-arch: amd64 + arm64 / Graviton-compatible)
# - Hive 3.1.3: compatible with Spark 3.5's embedded Hive 2.3 client
# - Includes: PostgreSQL JDBC driver (postgresql-42.7.3.jar), S3/GCS/Azure connectors
# - Apache Hive 4.x was not used: incompatible Thrift API with Spark 3.5 client
#   ("Invalid method name: get_table" error confirmed on staging-ai-dev 2026-02-20)
#
# Configuration:
# - DB: PostgreSQL via HIVE_CUSTOM_CONF_DIR (hive-site.xml with ConnectionURL)
# - S3A: IRSA via spark-driver ServiceAccount (AWS_WEB_IDENTITY_TOKEN_FILE auto-injected)
# - Warehouse: S3A (s3a://n-staging-testdata-us-west-2/forge-qa/warehouse/)
#   HMS itself does not need S3A JARs for external tables (Spark handles S3 directly).
#   S3A config in hive-site.xml enables warehouse dir access for managed table scenarios.
#
# Used by:
#   - Spark jobs via spark.hadoop.hive.metastore.uris
#   - Golden data pipeline (RFC-0031): CREATE TABLE, SHOW TABLES
#   - Iceberg tables via HiveCatalog (RFC-0034)
#
# Prerequisites:
#   - hms-postgresql must be running (see hms-postgresql.yaml)
#   - spark-driver ServiceAccount has IRSA for s3:GetObject / s3:PutObject
#
# Deploy:
#   kubectl apply -f hms-postgresql.yaml
#   kubectl apply -f hms-deployment.yaml
#
# Validate:
#   kubectl rollout status deployment/hms -n forge
#   kubectl logs -n forge -l app=hms | grep "Starting Hive Metastore Server"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hms-config
  namespace: forge
data:
  # hive-site.xml is mounted via HIVE_CUSTOM_CONF_DIR (symlinked into $HIVE_HOME/conf).
  # Sets PostgreSQL backend + S3A warehouse for HMS.
  # ilum/hive:3.1.3 already has postgresql-42.7.3.jar in /opt/hive/lib/ — no extra init needed.
  hive-site.xml: |
    <?xml version="1.0"?>
    <configuration>
      <!-- PostgreSQL metastore backend -->
      <property>
        <name>javax.jdo.option.ConnectionDriverName</name>
        <value>org.postgresql.Driver</value>
      </property>
      <property>
        <name>javax.jdo.option.ConnectionURL</name>
        <value>jdbc:postgresql://hms-pg.forge.svc.cluster.local:5432/metastore</value>
      </property>
      <property>
        <name>javax.jdo.option.ConnectionUserName</name>
        <value>hive</value>
      </property>
      <property>
        <name>javax.jdo.option.ConnectionPassword</name>
        <value>hive</value>
      </property>

      <!-- Warehouse dir: local path (HMS doesn't need S3A; Spark accesses S3 via its own config).
           ilum/hive:3.1.3 includes S3A JARs but not aws-java-sdk-sts (required for IRSA).
           For the spike, Spark creates EXTERNAL tables with explicit S3A LOCATION — HMS
           stores only the metadata and writes the warehouse placeholder locally. -->
      <property>
        <name>hive.metastore.warehouse.dir</name>
        <value>/tmp/hive/warehouse</value>
      </property>

      <!-- Schema auto-create on first start (emptyDir PG = fresh on restart) -->
      <property>
        <name>datanucleus.autoCreateSchema</name>
        <value>true</value>
      </property>
      <property>
        <name>datanucleus.fixedDatastore</name>
        <value>false</value>
      </property>

      <!-- No Thrift auth for cluster-internal use -->
      <property>
        <name>hive.metastore.event.db.notification.api.auth</name>
        <value>false</value>
      </property>

      <!-- Do not check/create table directories on HMS side (ADR-017: HMS is metadata-only).
           Without this, HMS calls getFileStatus/mkdirs on the table location, which fails
           when the location is S3A and HMS lacks aws-java-sdk-sts for IRSA auth. -->
      <property>
        <name>hive.metastore.check.and.initialize.dir</name>
        <value>false</value>
      </property>
    </configuration>

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hms
  namespace: forge
  labels:
    app: hms
    component: catalog
spec:
  replicas: 1
  # Recreate strategy: terminate old pod before starting new one.
  # Prevents schema-init race condition when both pods connect to the same PostgreSQL.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hms
  template:
    metadata:
      labels:
        app: hms
        component: catalog
    spec:
      serviceAccountName: spark-driver  # IRSA: S3A access for warehouse dir
      initContainers:
        - name: wait-for-pg
          image: postgres:15-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h hms-pg.forge.svc.cluster.local -p 5432 -U hive; do
                echo "Waiting for PostgreSQL..."; sleep 2;
              done
              echo "PostgreSQL ready."
      containers:
        - name: metastore
          image: ilum/hive:3.1.3
          env:
            # SERVICE_NAME=metastore triggers the Hive metastore service
            - name: SERVICE_NAME
              value: metastore
            # DB_DRIVER=postgres → schematool uses PostgreSQL (not Derby)
            - name: DB_DRIVER
              value: postgres
            # HIVE_CUSTOM_CONF_DIR: entrypoint symlinks files here into $HIVE_HOME/conf
            # Overrides ilum/hive's default hive-site.xml with our PostgreSQL + S3A config
            - name: HIVE_CUSTOM_CONF_DIR
              value: /opt/hive-custom-conf
          ports:
            - containerPort: 9083
              name: thrift
              protocol: TCP
          volumeMounts:
            - name: hms-config
              mountPath: /opt/hive-custom-conf
          resources:
            requests:
              cpu: "250m"
              memory: "768Mi"
            limits:
              cpu: "1"
              memory: "1.5Gi"
          readinessProbe:
            tcpSocket:
              port: 9083
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: 9083
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: hms-config
          configMap:
            name: hms-config

---
apiVersion: v1
kind: Service
metadata:
  name: hms
  namespace: forge
  labels:
    app: hms
    component: catalog
spec:
  selector:
    app: hms
  ports:
    - port: 9083
      targetPort: 9083
      name: thrift
      protocol: TCP
  type: ClusterIP
