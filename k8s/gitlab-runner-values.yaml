# GitLab Runner Helm values for staging-ai-dev (763165855768)
# Deployed in gitlab-ci namespace with IRSA for ECR + S3 access.
#
# Install:
#   helm install gitlab-runner gitlab/gitlab-runner \
#     -n gitlab-ci -f deploy/k8s/gitlab-runner-values.yaml
#
# Prerequisites:
#   1. kubectl create namespace gitlab-ci
#   2. Runner token stored in secret:
#      kubectl create secret generic gitlab-runner-token -n gitlab-ci \
#        --from-literal=runner-token=glrt-XXXXXXXX \
#        --from-literal=runner-registration-token=""
#   3. IRSA role: staging-ai-dev-gitlab-runner (created by post-deploy)

gitlabUrl: https://gitlab.com

# Runner token from K8s secret (created manually or by post-deploy script)
runners:
  secret: gitlab-runner-token

  config: |
    [[runners]]
      request_concurrency = 4
      [runners.kubernetes]
        namespace = "gitlab-ci"
        image = "763165855768.dkr.ecr.us-west-2.amazonaws.com/ai-factory-ci-base:1.0"
        helper_image = "registry.gitlab.com/gitlab-org/gitlab-runner/gitlab-runner-helper:arm64-v18.10.0"
        service_account = "gitlab-runner"
        # Heavy Rust/Go builds write large caches and artifacts. CPU/memory
        # requests let Karpenter scale the dedicated ci-builder pool instead of
        # overpacking build pods onto the system node group.
        cpu_request = "2"
        cpu_limit = "4"
        memory_request = "4Gi"
        memory_limit = "8Gi"
        cpu_request_overwrite_max_allowed = "8"
        cpu_limit_overwrite_max_allowed = "8"
        memory_request_overwrite_max_allowed = "16Gi"
        memory_limit_overwrite_max_allowed = "16Gi"
        ephemeral_storage_request = "8Gi"
        ephemeral_storage_limit = "32Gi"
        ephemeral_storage_request_overwrite_max_allowed = "16Gi"
        ephemeral_storage_limit_overwrite_max_allowed = "40Gi"
        helper_ephemeral_storage_request = "1Gi"
        helper_ephemeral_storage_limit = "2Gi"
        service_ephemeral_storage_request = "1Gi"
        service_ephemeral_storage_limit = "2Gi"
        node_selector_overwrite_allowed = "forge\\.granica\\.ai/pool=ci-builder"
        node_tolerations_overwrite_allowed = "forge\\.granica\\.ai/ci-builder=:NoSchedule"
        [runners.kubernetes.pod_labels]
          "forge.granica.ai/ci" = "true"
        [runners.kubernetes.pod_annotations]
          "karpenter.sh/do-not-disrupt" = "true"
          "cluster-autoscaler.kubernetes.io/safe-to-evict" = "false"
        [runners.kubernetes.node_selector]
          "forge.granica.ai/pool" = "ci-builder"
        [runners.kubernetes.node_tolerations]
          "forge.granica.ai/ci-builder=" = "NoSchedule"

# Service account with IRSA annotation for ECR + S3 access
serviceAccount:
  create: true
  name: gitlab-runner
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::763165855768:role/staging-ai-dev-gitlab-runner"

# Runner pod itself on system nodes
nodeSelector:
  forge.granica.ai/pool: system

# Concurrent jobs — sized for the dedicated ci-builder Karpenter pool rather
# than the small system node group.
concurrent: 10
