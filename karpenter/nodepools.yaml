---
# EC2NodeClass — shared by all NodePools.
# subnetSelectorTerms and securityGroupSelectorTerms discover resources via the
# karpenter.sh/discovery tag applied by Terraform (deploy/terraform/forge-aws/).
# amiFamily: AL2023 tells Karpenter to auto-discover the latest EKS-optimized
# AL2023 AMI (no amiSelectorTerms needed).
# instanceProfile is the Terraform-managed Karpenter node instance profile.
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: forge-default
spec:
  # AL2023 latest via alias — Karpenter auto-discovers the newest EKS-optimised AMI.
  amiSelectorTerms:
    - alias: al2023@latest
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: ${CLUSTER_NAME}
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: ${CLUSTER_NAME}
  instanceProfile: ${KARPENTER_NODE_INSTANCE_PROFILE}
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 100Gi
        volumeType: gp3
        iops: 3000
        throughput: 125
        encrypted: true
