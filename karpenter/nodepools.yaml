---
# Karpenter NodePool manifests — applied by Terraform when enable_karpenter=true (default).
#
# 2 pools: granica-on-demand (drivers, system workloads) + granica-on-spot (executors, batch).
# The system MNG stays as an EKS managed node group (Karpenter can't manage its own infra).
#
# Workload scheduling via nodeSelector:
#   nodeUse: granica-on-demand  → on-demand pool (drivers, coordinators)
#   nodeUse: granica-on-spot    → spot pool (executors, batch)
#
# Variables substituted by envsubst at apply time:
#   ${CLUSTER_NAME}, ${KARPENTER_NODE_INSTANCE_PROFILE}, ${ARCH}
#
# API: karpenter.sh/v1 (requires Karpenter >= 1.0)

---
# On-demand pool — drivers, coordinators, anything that must not be interrupted.
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: granica-on-demand
spec:
  weight: 50
  template:
    metadata:
      labels:
        nodeUse: granica-on-demand
    spec:
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["${ARCH}"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["m", "r", "c"]
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["6"]
        - key: karpenter.k8s.aws/instance-size
          operator: In
          values: ["xlarge", "2xlarge", "4xlarge", "8xlarge"]
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: forge-default
      expireAfter: 720h  # 30 days — forces AMI rotation
  limits:
    cpu: "100"
    memory: 400Gi
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 600s  # 10 min warm window for driver nodes

---
# Spot pool — executors, batch compute.
# Broad instance selection for Spot diversity (3 families × 4 sizes × 2+ gens = 24+ types).
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: granica-on-spot
spec:
  weight: 50
  template:
    metadata:
      labels:
        nodeUse: granica-on-spot
    spec:
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["${ARCH}"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot"]
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["m", "r", "c"]
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["6"]
        - key: karpenter.k8s.aws/instance-size
          operator: In
          values: ["4xlarge", "8xlarge", "12xlarge", "16xlarge"]
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: forge-default
      expireAfter: 168h  # 7 days
  limits:
    cpu: "2000"
    memory: 8000Gi
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 300s  # 5 min warm window
    budgets:
      - nodes: "20%"

---
# EC2NodeClass — shared by all NodePools.
# Discovers subnets and SGs via karpenter.sh/discovery tag applied by Terraform.
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: forge-default
spec:
  amiSelectorTerms:
    - alias: al2023@latest
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: ${CLUSTER_NAME}
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: ${CLUSTER_NAME}
  instanceProfile: ${KARPENTER_NODE_INSTANCE_PROFILE}
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 100Gi
        volumeType: gp3
        iops: 3000
        throughput: 125
        encrypted: true
