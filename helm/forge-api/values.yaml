# DEPRECATED: This Helm chart is maintained for backwards compatibility only.
# The canonical deployment path is the ForgeCluster operator (operator/charts/forge-api/).
# New features and configuration options are added to the operator chart first.
# See docs/queryui-demo-runbook.md for the recommended deployment flow.

replicaCount: 1

# clusterName is surfaced via GET /v1/system/info so FDEs can identify the deployment.
# Set this to the EKS cluster name when deploying (e.g. customer-ai-forge, project-n-bigabid-c36b).
clusterName: ""

image:
  repository: 763165855768.dkr.ecr.us-west-2.amazonaws.com/forge-api
  tag: v0.6.5-beta
  pullPolicy: Always

# Single image tag drives all Forge images (TKT-46 fix).
# forge-api derives crunch:$TAG-spark and crunch:$TAG from FORGE_IMAGE_TAG.
forgeImageTag: v0.6.5-beta

env:
  FORGE_NAMESPACE: forge
  FORGE_MAX_CONCURRENT_JOBS: "5"
  FORGE_MAX_QUEUE_DEPTH: "100"
  FORGE_DEFAULT_EXECUTORS: "1"
  FORGE_AUTH_REQUIRED: "true"
  FORGE_TRACING_ENABLED: "true"
  FORGE_PROTECTED_PREFIXES: "s3://n-staging-testdata-us-west-2/forge-qa/raw"
  FORGE_TRINO_BASE_URL: "http://trino.trino.svc.cluster.local:8080"
  FORGE_TRINO_LOG_BUCKET: "forge-trino-logs"
  # TKT-99: History bucket for /v1/jobs/history API.
  # Override per-deployment (e.g. customer-ai-forge-data for the customer-ai cluster).
  FORGE_HISTORY_BUCKET: ""
  # S3 URIs for metrics and system tables. Override per-deployment.
  FORGE_METRICS_BASE_URI: ""
  FORGE_SYSTEM_TABLE_URI: ""
  # Set FORGE_API_KEYS_FILE when apiKeys.secretName is configured
  FORGE_API_KEYS_FILE: /etc/forge-keys/keys
  # TKT-111 / RFC-0073: minimum DRR threshold. Any ForgeJob whose measured DRR falls
  # below this value will NOT commit — original files are kept untouched. Default 0.0
  # blocks negative-DRR commits (output larger than input) without filtering low-but-positive
  # gains. Raise to e.g. "0.05" to skip tables where Forge achieves <5% reduction.
  FORGE_MIN_DRR: "0.0"
  # Mercedes demo walkthrough data root.
  # Override per-deployment with the S3 path to demo data.
  FORGE_QUERY_UI_DEMO_TABLE_PATH: ""
  # Catalyst on hold (2026-04-06): benchmarks have caching artifacts, results misleading.
  # Set to "true" to re-enable when benchmark methodology is corrected.
  GRANICA_CATALYST_ENABLED: "false"

# TF-004: API key secret mount. Set secretName to enable auth.
# The secret must have a key named "keys" containing one API key per line.
apiKeys:
  secretName: forge-api-keys

service:
  type: ClusterIP
  port: 6066

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

serviceAccount:
  # Set to the IRSA role ARN for this cluster (output from Terraform).
  annotations:
    eks.amazonaws.com/role-arn: ""

# Spark driver IRSA role for the spark-driver SA.
sparkDriver:
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: ""

# TKT-121: Prometheus ServiceMonitor for forge-api /metrics scraping.
# Requires kube-prometheus-stack (or any Prometheus Operator) to be installed.
# labels must match the Prometheus CR's serviceMonitorSelector (default: release=kube-prometheus-stack).
serviceMonitor:
  enabled: true
  interval: "15s"
  labels:
    release: kube-prometheus-stack

# TKT-122: Grafana dashboard for Forge job metrics (DRR, bytes, throughput, latency).
# Deployed as a ConfigMap in the monitoring namespace with label grafana_dashboard=1,
# which kube-prometheus-stack's Grafana sidecar picks up automatically.
# Set namespace to match where Grafana is deployed in your cluster.
grafanaDashboard:
  enabled: true
  namespace: monitoring

nodeSelector:
  kubernetes.io/arch: arm64

tolerations:
  - key: kubernetes.io/arch
    operator: Equal
    value: arm64
    effect: NoSchedule

workspace:
  # Which runtime forge-api should present as the active /console/sql surface.
  # Keep this aligned with the enabled runtime URLs below.
  activeBackend: spark_connect

  sparkConnect:
    enabled: false
    serviceName: spark-connect
    port: 15002
    url: sc://spark-connect:15002
    selector:
      app: spark-connect
      spark-role: driver
    authProxy:
      enabled: false
      serviceName: spark-connect-auth-proxy
      port: 8443

  jupyter:
    enabled: false
    serviceName: jupyter
    url: ""
    # REQUIRED: set via values override or use tokenSecretRef pattern in operator chart.
    token: ""
    image:
      repository: quay.io/jupyter/pyspark-notebook
      tag: "2026-03-16@sha256:f0485b68ad9b0fca510c22ee81a8cfeeeb0cf7aa3e3aff45197768df6917d61f"
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 8888
    env: {}
    resources:
      requests:
        cpu: 250m
        memory: 1Gi
      limits:
        cpu: "1"
        memory: 2Gi
    serviceAccountName: forge-api
    storage:
      enabled: false
      existingClaim: ""
      mountPath: /home/jovyan/work

  kyuubi:
    enabled: false
    dsn: kyuubi://kyuubi:10009/default
    image:
      repository: apache/kyuubi
      tag: "1.10.0"
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      thriftPort: 10009
      webPort: 10099
    env:
      KYUUBI_HOME: /opt/kyuubi
      SPARK_HOME: /opt/spark
      SPARK_REMOTE: sc://spark-connect:15002
      KYUUBI_FRONTEND_BIND_HOST: 0.0.0.0
      KYUUBI_FRONTEND_THRIFT_BINARY_BIND_PORT: "10009"
      KYUUBI_FRONTEND_REST_BIND_PORT: "10099"
    config:
      kyuubi.frontend.connection.url.use.hostname: "true"
      kyuubi.engine.type: SPARK_SQL
      kyuubi.authentication: NONE
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
